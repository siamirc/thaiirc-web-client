<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThaiIRC Web Client - ธีมมืดนีออน</title>
    <style>
        /* 🎨 ดีไซน์หน้าต่างแชทธีมมืดนีออนสไตล์โมเดิร์นหรูหรา ฝังในไฟล์ 100% */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #090d16; /* สีพื้นหลังมืดสนิทสไตล์ Cyberpunk */
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* หน้าต่างกล่องล็อกอินตอนเข้าเว็บครั้งแรก */
        .login-container {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .login-container h2 { color: #ffffff; margin-bottom: 24px; font-size: 24px; }
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
        .input-field {
            width: 100%;
            padding: 12px;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #3b82f6; }
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 12px;
        }
        .login-btn:hover { background-color: #1d4ed8; }

        /* 💬 โครงสร้างหน้าต่างห้องแชทหลักหลัก (จะแสดงหลังจากล็อกอินสำเร็จ) */
        .chat-container {
            display: none; /* ซ่อนไว้ก่อนในตอนแรก */
            width: 100%;
            height: 100vh;
            flex-direction: column;
            background-color: #0b0f19;
        }
        .chat-header {
            background-color: #111827;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-b: 1px solid #1f2937;
            border-bottom: 1px solid #1f2937;
        }
        .chat-body { display: flex; flex-grow: 1; overflow: hidden; }
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; padding: 15px; }
        
        /* ช่องพ่นข้อความแชทสีไฟนีออนอ่านง่ายสบายตา */
        .chat-display {
            flex-grow: 1;
            background-color: #070a12;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.5;
        }
        .user-list-sidebar {
            width: 220px;
            background-color: #111827;
            border-left: 1px solid #1f2937;
            padding: 15px;
            overflow-y: auto;
        }
        .user-list-title { font-size: 12px; font-weight: bold; color: #4b5563; uppercase; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase;}
        
        /* ช่องพิมพ์ส่งข้อความด้านล่างสุด */
        .input-area { display: flex; gap: 10px; }
        .msg-input {
            flex-grow: 1;
            padding: 14px;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
        }
        .msg-input:focus { border-color: #3b82f6; }
        .send-btn {
            padding: 0 24px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .send-btn:hover { background-color: #059669; }
    </style>
</head>
<body>

    <!-- 🔒 หน้าต่างด่านที่ 1: กล่องรับข้อมูลล็อกอินเข้าแชทอย่างปลอดภัย -->
    <div class="login-container" id="loginBox">
        <h2>ThaiIRC Web Client</h2>
        <div class="input-group">
            <label>ชื่อเล่น (Nickname)</label>
            <input type="text" id="nickField" class="input-field" placeholder="กรอกชื่อเล่นของคุณ">
        </div>
        <div class="input-group">
            <label>รหัสผ่านห้องแชท (Password - ถ้ามี)</label>
            <!-- 🌟 ป้องกันพาสเวิร์ดหลุด: ช่องรับข้อมูลใช้ type="password" หน้าจอจะขึ้นเป็นจุดดำ ปลอดภัยจากการแคปจอ -->
            <input type="password" id="passField" class="input-field" placeholder="กรอกรหัสผ่าน">
        </div>
        <div class="input-group">
            <label>ห้องสนทนา (Channel)</label>
            <input type="text" id="chanField" class="input-field" value="#ThaiIRC">
        </div>
        <button class="login-btn" onclick="startWebChat()">เชื่อมต่อเข้าห้องแชท</button>
    </div>

    <!-- 💬 หน้าต่างด่านที่ 2: ห้องแชทหลักเมื่อล็อกอินผ่านสำเร็จ (ปลอดภัย URL ด้านบนสะอาด 100%) -->
    <div class="chat-container" id="chatBox">
        <div class="chat-header">
            <div style="font-weight: bold; font-size: 16px;">🌐 ThaiIRC Web Network</div>
            <div id="statusLabel" style="color: #10b981; font-size: 14px; font-weight: 500;">● กำลังออนไลน์</div>
        </div>
        <div class="chat-body">
            <div class="chat-area">
                <!-- ช่องแสดงข้อความแชทหลัก -->
                <div class="chat-display" id="chatDisplay">
                    <div style="color: #64748b; font-size: 12px;">*** ยินดีต้อนรับเข้าสู่ระบบเว็บแชทเวอร์ชันความปลอดภัยสูง...</div>
                </div>
                <!-- แถบช่องพิมพ์ข้อความด้านล่างสุด -->
                <div class="input-area">
                    <input type="text" id="messageInput" class="msg-input" placeholder="พิมพ์ข้อความที่ต้องการส่งที่นี่..." onkeypress="checkEnter(event)">
                    <button class="send-btn" onclick="sendMessage()">ส่ง</button>
                </div>
            </div>
            <!-- แถบรายชื่อคนออนไลน์ขวามือ -->
            <div class="user-list-sidebar">
                <div class="user-list-title">รายชื่อออนไลน์</div>
                <div id="userListContent" style="font-size: 14px; display: flex; flex-direction: column; gap: 8px;">
                    <!-- รายชื่อจริงจากเซิร์ฟเวอร์จะมาพ่นโชว์ตรงนี้ -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // สุ่มตัวเลข 4 หลักนำร่องใส่ในช่องชื่อเล่นรอไว้ล่วงหน้าเพื่อความสะดวกสบายแบบแอปวินโดว์
        document.getElementById('nickField').value = "pyWeb" + Math.floor(1000 + Math.random() * 9000);

        function startWebChat() {
            let nick = document.getElementById('nickField').value.trim();
            let password = document.getElementById('passField').value.trim();
            let channel = document.getElementById('chanField').value.trim();

            if(!nick) { alert("กรุณากรอกชื่อเล่นก่อนเชื่อมต่อครับ"); return; }

            // 🌟 จุดตัดสินเรื่องความปลอดภัยเด็ดขาด: 
            // ระบบจะนำค่าดึงข้อมูลล็อกอินส่งเข้าหน่วยความจำระบบหลังบ้านโดยตรง 
            // โดยจะไม่มีการเอาค่า password ไปแปะโชว์บนแถบ URL Address Bar ด้านบนเด็ดขาด แคปจอหรือก๊อปลิงก์ยังไงก็ปลอดภัย 100%
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('chatBox').style.display = 'flex';
            
            appendLog(`*** ระบบกำลังทำการล็อกอินในชื่อ ${nick} เข้าสู่ห้องแชท ${channel}...`);
            
            // --- พิกัดเชื่อมต่อไปหาตัวไฟล์สะพานเชื่อมหลังบ้าน irc_client.py ของท่าน ---
            // (ในอนาคตเมื่อท่านเปิดเซิร์ฟเวอร์หลังบ้าน ให้ผูกระบบ WebSocket เชื่อมข้อมูลเข้ามาที่จุดนี้ได้เลยครับ)
        }

        function appendLog(text) {
            let display = document.getElementById('chatDisplay');
            display.innerHTML += `<div>${text}</div>`;
            display.scrollTop = display.scrollHeight;
        }

        function sendMessage() {
            let input = document.getElementById('messageInput');
            let msg = input.value.trim();
            if(!msg) return;
            
            let myNick = document.getElementById('nickField').value;
            appendLog(`<b style='color: #3b82f6;'>&lt;${myNick}&gt;</b> ${msg}`);
            input.value = "";
        }

        function checkEnter(event) {
            if (event.key === 'Enter') { sendMessage(); }
        }
    </script>
</body>
</html>
